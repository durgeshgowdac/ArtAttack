version = 1

exclude_patterns = [
    "Assets/Plugins/**",
    "Assets/Editor/**",
    "Library/**",
    "Temp/**",
    "Obj/**",
    "Build/**",
    "Logs/**",
    "UserSettings/**"
]

[[analyzers]]
name = "csharp"
enabled = true

  [analyzers.meta]
  # Optional: adjust complexity threshold (low, medium, high, very-high, critical)
  cyclomatic_complexity_threshold = "medium"

[[analyzers]]
name = "secrets"
enabled = true
